name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint
        working-directory: backend
        run: npm run lint

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  lint-worker:
    name: Lint Python Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        working-directory: worker
        run: flake8 worker.py --max-line-length=200 --ignore=E221,E302,E303,E305,W503,W504 || true

  # ─── Build & Push Docker Images ────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, lint-worker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & push Backend
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/ai-task-backend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_USERNAME }}/ai-task-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & push Worker
      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/ai-task-worker:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_USERNAME }}/ai-task-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & push Frontend
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/ai-task-frontend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_USERNAME }}/ai-task-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Update Infra Repo (GitOps) ────────────────────────────────────────────
  update-infra:
    name: Update Infra Repo (GitOps)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DOCKER_USERNAME }}/ai-task-platform-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update image tags in K8s manifests
        run: |
          cd infra
          NEW_TAG="${{ env.IMAGE_TAG }}"

          # Update backend image tag
          sed -i "s|DOCKER_USERNAME/ai-task-backend:.*|${{ env.DOCKER_USERNAME }}/ai-task-backend:${NEW_TAG}|g" k8s/base/backend.yaml

          # Update worker image tag
          sed -i "s|DOCKER_USERNAME/ai-task-worker:.*|${{ env.DOCKER_USERNAME }}/ai-task-worker:${NEW_TAG}|g" k8s/base/worker.yaml

          # Update frontend image tag
          sed -i "s|DOCKER_USERNAME/ai-task-frontend:.*|${{ env.DOCKER_USERNAME }}/ai-task-frontend:${NEW_TAG}|g" k8s/base/frontend.yaml

      - name: Commit and push to infra repo
        run: |
          cd infra
          git config user.email "ci-bot@github-actions.com"
          git config user.name "GitHub Actions CI"
          git add k8s/base/backend.yaml k8s/base/worker.yaml k8s/base/frontend.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ env.IMAGE_TAG }} [skip ci]"
          git push
